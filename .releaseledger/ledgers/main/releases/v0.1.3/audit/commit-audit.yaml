      deletions: 9
    inspected: true
    inspected_paths:
      - sphinxpress/templates/tool-doc.html
      - docs/jekyll-integration.md
      - tests/test_templates.py
    observed_behavior:
      "Adds a packaged Jekyll layout at sphinxpress/templates/tool-doc.html
      for generated tool pages. The layout reads site.data.tool_nav[page.nav_tool] and
      renders the tool title, a <details> version switcher from nav.versions (the entry
      with current: true shown as plain text inside the summary, others as links), the
      repo link from nav.repo_url, the latest-release link from nav.release_tag/nav.release_url,
      and the entries <ul> from nav.entries with the existing label cleanup and active/aria-current
      rule. The version switcher <details> block is omitted entirely when nav.versions
      is missing or empty, keeping the layout usable for working-tree-only sites. docs/jekyll-integration.md
      is updated to document the new layout, its required front matter, and rendering
      behavior. tests/test_templates.py gains two new tests that assert the layout is
      packaged and that its template content is structurally valid (matched if/for/details
      tags, no raw/endraw blocks)."
    public_impact: public
    decision: accepted
    evidence_subject: "feat: per tool rendering for different variants added"
