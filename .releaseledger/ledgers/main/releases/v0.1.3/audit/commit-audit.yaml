    observed_behavior:
      Introduces optional [site.versioning] with named variants (working_tree,
      release, git_ref). build-site resolves every configured variant per project by
      default, with --variant/--variants filters. Per-target page front matter and per-variant
      nav YAML files are written; nav payloads gain variant, ref, commit, source_url,
      and a version-switcher list. Liquid protection wraps generated HTML in a balanced
      raw block and neutralizes literal endraw examples. [book].docs_variant picks a
      single variant for combined EPUB/PDF. build-site now writes a generated-output
      manifest and removes stale files for variants no longer selected. Managed build
      env scope is hard-pinned to shared.
    public_impact: public
    decision: accepted
    evidence_subject: "feat: allow docs variant (e.g. release and git main version)"
  - sha: 3d9ff4a54a2187adaf12c4ad857a571f9909f23b
