    inspected_paths:
      - sphinxpress/source_manager.py
      - tests/test_source_manager.py
    observed_behavior:
      source_manager now runs git worktree prune for any project whose
      variants include a non-working_tree source, so an external rm -rf of the .sphinxpress
      sources tree no longer leaves stale (detached HEAD) prunable worktree registrations
      that would block the next build.
    public_impact: public
    decision: accepted
    evidence_subject: "feat: clean worktree on build and fix project variants"
  - sha: 462aa3b097a4533408decb81b02f4d028963694e
