    observed_behavior:
      New `sphinxpress sync-layout` command copies the package's tool-doc.html
      into <site.root>/_layouts/<site.layout>.html. Default policy skips identical files
      and refuses (exit 1) when the consumer's copy has drifted, printing a unified
      diff. --force overwrites and --dry-run prints the diff without writing.
    public_impact: public
    decision: accepted
